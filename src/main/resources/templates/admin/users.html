<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0",name="_csrf" th:content="${_csrf.token}"/>
    <title>Users — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/admin/dashboard" class="nav-logo">
            <div class="logo-aj">AJ</div>
            <span class="logo-text">Transportation</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}">Bookings</a>
            <a th:href="@{/admin/trips}">Manage Slots</a>
            <a th:href="@{/admin/block}">Block Time</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/admin/logs}">Logs</a>
        </div>
        <div class="nav-actions">
            <span class="nav-user" sec:authentication="name"></span>
            <a th:href="@{/logout}" class="btn-nav-logout">Logout</a>
        </div>
        <button class="nav-hamburger" onclick="toggleMobileMenu()">
            <span></span><span></span><span></span>
        </button>
    </div>
    <div class="nav-mobile" id="mobileMenu">
        <a th:href="@{/admin/dashboard}">Bookings</a>
        <a th:href="@{/admin/trips}">Manage Slots</a>
        <a th:href="@{/admin/block}">Block Time</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/logs}">Logs</a>
        <a th:href="@{/logout}">Logout</a>
        </div>
</nav>
<div style="padding-top:var(--nav-h);min-height:100vh;background:var(--bg);">
<div class="admin-page">
    <div class="admin-header">
        <div>
            <h1 class="admin-title">Users</h1>
            <p style="color:var(--text-muted);font-size:0.9rem;">
                <span th:text="${totalCount}">0</span> total ·
                <span th:text="${blockedCount}">0</span> blocked ·
                <span th:text="${unverifiedCount}">0</span> unverified
            </p>
        </div>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(users)}" class="empty-state"><p>No users yet.</p></div>

    <div th:unless="${#lists.isEmpty(users)}" class="admin-card">
        <table class="admin-table">
            <thead><tr>
                <th>Email</th><th>Username</th><th>Phone</th>
                <th>Role</th><th>Verified</th><th>Status</th><th>Joined</th><th>Actions</th>
            </tr></thead>
            <tbody>
                <tr th:each="user : ${users}" th:classappend="${user.blocked}?'row-blocked':''">
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.phoneNumber!=null?user.phoneNumber:'—'}"></td>
                    <td><span class="status-badge" th:classappend="${user.role=='ADMIN'}?'badge-booked':'badge-available'" th:text="${user.role}"></span></td>
                    <td>
                        <span th:if="${user.emailVerified}"  style="color:var(--success);font-weight:600;">✓ Yes</span>
                        <span th:unless="${user.emailVerified}" style="color:var(--danger);font-weight:600;">✗ No</span>
                    </td>
                    <td>
                        <span th:if="${user.blocked}"  class="status-badge badge-blocked">Blocked</span>
                        <span th:unless="${user.blocked}" class="status-badge badge-available">Active</span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt,'dd MMM yyyy')}"></td>
                    <td class="action-cell">
                        <form th:if="${!user.emailVerified}" th:action="@{/admin/users/verify/{id}(id=${user.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-success" onclick="return confirm('Manually verify this user?')">Verify</button>
                        </form>
                        <form th:if="${!user.blocked and user.role!='ADMIN'}" th:action="@{/admin/users/block/{id}(id=${user.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-warning" onclick="return confirm('Block this user?')">Block</button>
                        </form>
                        <form th:if="${user.blocked}" th:action="@{/admin/users/unblock/{id}(id=${user.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-success">Unblock</button>
                        </form>
                        <form th:if="${user.role!='ADMIN'}" th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete permanently?')">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/admin-notifications.js}"></script>
</body>
</html>
