<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Bookings — AJ Transportation Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo"><div class="logo-aj">AJ</div><span class="logo-text">Transportation</span></a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}">Dashboard</a>
            <a th:href="@{/admin/bookings/pending}" class="active">Pending Bookings</a>
            <a th:href="@{/admin/trips}">Trips</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/admin/logs}">Logs</a>
        </div>
        <div class="nav-actions">
            <a th:href="@{/logout}" class="btn-nav-logout">Logout</a>
        </div>
    </div>
</nav>

<div style="padding-top:var(--nav-h);min-height:100vh;background:var(--bg);">
    <div class="dashboard-page">

        <div class="dashboard-header">
            <div>
                <h1>Pending Bookings</h1>
                <p style="color:var(--text-muted);">Accept or reject incoming booking requests from users.</p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary">← Back to Dashboard</a>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
            <p>🎉 No pending bookings right now.</p>
        </div>

        <!-- Pending bookings table -->
        <div th:unless="${#lists.isEmpty(bookings)}" class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Phone</th>
                        <th>Trip Date</th>
                        <th>Time</th>
                        <th>Pickup</th>
                        <th>Dropoff</th>
                        <th>Fare</th>
                        <th>Requested</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.user.email}"></td>
                        <td th:text="${booking.user.phoneNumber != null ? booking.user.phoneNumber : '—'}"></td>
                        <td th:text="${#temporals.format(booking.trip.date, 'EEE dd MMM yyyy')}"></td>
                        <td th:text="${#temporals.format(booking.trip.startTime, 'HH:mm')}"></td>
                        <td th:text="${booking.pickupAddress != null ? booking.pickupAddress : '—'}"></td>
                        <td th:text="${booking.dropoffAddress != null ? booking.dropoffAddress : '—'}"></td>
                        <td th:text="${booking.trip.fee != null ? 'R' + booking.trip.fee : '—'}"></td>
                        <td th:text="${#temporals.format(booking.createdAt, 'dd MMM HH:mm')}"></td>
                        <td>
                            <div style="display:flex;gap:8px;">
                                <!-- Accept -->
                                <form th:action="@{/admin/bookings/accept/{id}(id=${booking.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-primary"
                                            onclick="return confirm('Accept this booking?')">✓ Accept</button>
                                </form>
                                <!-- Reject -->
                                <form th:action="@{/admin/bookings/reject/{id}(id=${booking.id})}" method="post" style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Reject this booking? The slot will be freed.')">✗ Reject</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
