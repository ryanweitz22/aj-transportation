<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0",name="_csrf" th:content="${_csrf.token}"/>
    <title>Trip Log — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo"><div class="logo-aj">AJ</div><span class="logo-text">Transportation</span></a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}">Schedule</a>
            <a th:href="@{/admin/trips}">Trips</a>
            <a th:href="@{/admin/requests}">Requests</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/admin/logs}" class="active">Logs</a>
        </div>
        <div class="nav-actions">
            <span class="nav-user" sec:authentication="name"></span>
            <a th:href="@{/logout}" class="btn-nav-logout">Logout</a>
        </div>
    </div>
</nav>
<div style="padding-top:var(--nav-h);min-height:100vh;background:var(--bg);">
<div class="admin-page">
    <div class="admin-header"><h1 class="admin-title">Trip Log</h1></div>

    <div class="admin-card" style="padding:20px 24px;margin-bottom:20px;">
        <form th:action="@{/admin/logs}" method="get" style="display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;">
            <div style="display:flex;flex-direction:column;gap:4px;">
                <label style="font-size:0.8rem;font-weight:600;color:var(--text-muted);">From</label>
                <input type="date" name="from" th:value="${from}" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.875rem;outline:none;" />
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;">
                <label style="font-size:0.8rem;font-weight:600;color:var(--text-muted);">To</label>
                <input type="date" name="to" th:value="${to}" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.875rem;outline:none;" />
            </div>
            <button type="submit" class="btn btn-primary btn-sm">Filter</button>
            <a th:href="@{/admin/logs}" class="btn btn-secondary btn-sm">This Month</a>
        </form>
    </div>

    <div class="stats-grid" style="margin-bottom:20px;">
        <div class="stat-card"><span class="stat-number" th:text="${booked}">0</span><span class="stat-label">Trips Booked</span></div>
        <div class="stat-card"><span class="stat-number" th:text="${available}">0</span><span class="stat-label">Available Slots</span></div>
        <div class="stat-card"><span class="stat-number" th:text="'R' + ${#numbers.formatDecimal(revenue,1,2)}">R0</span><span class="stat-label">Revenue</span></div>
    </div>

    <div th:if="${#lists.isEmpty(trips)}" class="empty-state"><p>No trips in this date range.</p></div>

    <div th:unless="${#lists.isEmpty(trips)}" class="admin-card">
        <table class="admin-table">
            <thead><tr><th>Date</th><th>Time</th><th>Route</th><th>Distance</th><th>Fee</th><th>Status</th></tr></thead>
            <tbody>
                <tr th:each="trip : ${trips}"
                    th:classappend="${trip.status=='BLOCKED'}?'row-blocked':(${trip.status=='BOOKED'}?'row-booked':'')">
                    <td th:text="${#temporals.format(trip.date,'EEE dd MMM yyyy')}"></td>
                    <td>
                        <span th:text="${#temporals.format(trip.startTime,'HH:mm')}"></span>
                        <span th:if="${trip.endTime!=null}"> – <span th:text="${#temporals.format(trip.endTime,'HH:mm')}"></span></span>
                    </td>
                    <td th:text="${trip.label}"></td>
                    <td th:text="${trip.distanceKm!=null?trip.distanceKm+' km':'—'}"></td>
                    <td th:text="${trip.fee!=null?'R'+trip.fee:'—'}"></td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${trip.status=='AVAILABLE'}?'badge-available':(${trip.status=='BOOKED'}?'badge-booked':'badge-blocked')"
                              th:text="${trip.status}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/admin-notifications.js}"></script>
</body>
</html>
