<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0",name="_csrf" th:content="${_csrf.token}"/>
    <title>Manage Slots — AJ Transportation Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/bookings.css}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a href="/admin/dashboard" class="nav-logo">
            <div class="logo-aj">AJ</div>
            <span class="logo-text">Transportation</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}">Bookings</a>
            <a th:href="@{/admin/trips}" class="active">Manage Slots</a>
            <a th:href="@{/admin/block}">Block Time</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/admin/logs}">Logs</a>
        </div>
        <div class="nav-actions">
            <span class="nav-user" sec:authentication="name"></span>
            <a th:href="@{/logout}" class="btn-nav-logout">Logout</a>
        </div>
        <button class="nav-hamburger" onclick="toggleMobileMenu()">
            <span></span><span></span><span></span>
        </button>
    </div>
    <div class="nav-mobile" id="mobileMenu">
        <a th:href="@{/admin/dashboard}">Bookings</a>
        <a th:href="@{/admin/trips}">Manage Slots</a>
        <a th:href="@{/admin/block}">Block Time</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/logs}">Logs</a>
        <a th:href="@{/logout}">Logout</a>
    </div>
</nav>

<div>
  <div class="admin-page">
    <div class="admin-header">
      <h1 class="admin-title">Trip Slots</h1>
      <a href="/admin/trips/new" class="btn btn-primary">+ Create New Slot</a>
    </div>

    <!-- Success / Error messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(trips)}" class="empty-state">
      <p>No trip slots found for this week. <a href="/admin/trips/new">Create one now →</a></p>
    </div>

    <!-- Trips table -->
    <div th:unless="${#lists.isEmpty(trips)}" class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Start</th>
            <th>End</th>
            <th>Label / Route</th>
            <th>Fee</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="trip : ${trips}"
              th:classappend="${trip.status == 'BLOCKED'} ? 'row-blocked' :
                              (${trip.status == 'BOOKED'} ? 'row-booked' : '')">

            <td th:text="${#temporals.format(trip.date, 'EEE dd MMM yyyy')}"></td>
            <td th:text="${#temporals.format(trip.startTime, 'HH:mm')}"></td>
            <td th:text="${#temporals.format(trip.endTime, 'HH:mm')}"></td>
            <td th:text="${trip.label}"></td>
            <td th:text="${trip.fee != null ? 'R' + trip.fee : '—'}"></td>

            <!-- Status badge -->
            <td>
              <span class="status-badge"
                    th:classappend="${trip.status == 'AVAILABLE'} ? 'badge-available' :
                                    (${trip.status == 'BOOKED'} ? 'badge-booked' : 'badge-blocked')"
                    th:text="${trip.status}">
              </span>
            </td>

            <!-- Action buttons -->
            <td class="action-cell">

              <!-- Block button (only for AVAILABLE slots) -->
              <form th:if="${trip.status == 'AVAILABLE'}"
                    th:action="@{/admin/trips/block/{id}(id=${trip.id})}"
                    method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="reason" value="Blocked by admin" />
                <button type="submit" class="btn btn-sm btn-warning"
                        onclick="return confirm('Block this slot?')">Block</button>
              </form>

              <!-- Unblock button (only for BLOCKED slots) -->
              <form th:if="${trip.status == 'BLOCKED'}"
                    th:action="@{/admin/trips/unblock/{id}(id=${trip.id})}"
                    method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-sm btn-success">Unblock</button>
              </form>

              <!-- Delete button (only for AVAILABLE or BLOCKED — not BOOKED) -->
              <form th:if="${trip.status != 'BOOKED'}"
                    th:action="@{/admin/trips/delete/{id}(id=${trip.id})}"
                    method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-sm btn-danger"
                        onclick="return confirm('Delete this trip permanently? This cannot be undone.')">
                  Delete
                </button>
              </form>

            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/admin-notifications.js}"></script>
</body>
</html>
