<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0",name="_csrf" th:content="${_csrf.token}"/>
    <title>Trip Requests — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo"><div class="logo-aj">AJ</div><span class="logo-text">Transportation</span></a>
        <div class="nav-links">
            <a th:href="@{/admin/dashboard}">Schedule</a>
            <a th:href="@{/admin/trips}">Trips</a>
            <a th:href="@{/admin/requests}" class="active">Requests</a>
            <a th:href="@{/admin/users}">Users</a>
            <a th:href="@{/admin/logs}">Logs</a>
        </div>
        <div class="nav-actions">
            <span class="nav-user" sec:authentication="name"></span>
            <a th:href="@{/logout}" class="btn-nav-logout">Logout</a>
        </div>
    </div>
</nav>
<div style="padding-top:var(--nav-h);min-height:100vh;background:var(--bg);">
<div class="admin-page">
    <div class="admin-header">
        <div>
            <h1 class="admin-title">Trip Requests</h1>
            <p style="color:var(--text-muted);font-size:0.9rem;">Users who requested a custom trip. Review and approve or reject.</p>
        </div>
        <div style="display:flex;gap:8px;">
            <a th:href="@{/admin/requests(filter='pending')}" class="btn btn-sm" th:classappend="${filter=='pending'}?'btn-primary':'btn-secondary'">Pending</a>
            <a th:href="@{/admin/requests(filter='all')}"     class="btn btn-sm" th:classappend="${filter=='all'}?'btn-primary':'btn-secondary'">All</a>
        </div>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(requests)}" class="empty-state">
        <p th:text="${filter=='pending'}?'No pending requests — all caught up!':'No requests yet.'"></p>
    </div>

    <div th:each="req : ${requests}" class="admin-card" style="margin-bottom:16px;">
        <div style="padding:20px 24px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                <div>
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
                        <span class="status-badge"
                              th:classappend="${req.status=='PENDING'}?'badge-pending':(${req.status=='APPROVED'}?'badge-confirmed':'badge-cancelled')"
                              th:text="${req.status}"></span>
                        <span style="font-weight:700;" th:text="${#temporals.format(req.requestedDate,'EEE dd MMM yyyy')}"></span>
                        <span style="color:var(--text-muted);">at</span>
                        <span style="font-weight:600;" th:text="${#temporals.format(req.requestedStartTime,'HH:mm')}"></span>
                    </div>
                    <div style="font-size:0.8rem;color:var(--text-muted);">Submitted <span th:text="${#temporals.format(req.createdAt,'dd MMM yyyy HH:mm')}"></span></div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
                <div style="background:var(--bg);border-radius:10px;padding:14px;">
                    <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">User</div>
                    <div style="font-weight:600;" th:text="${req.user.username}"></div>
                    <div style="font-size:0.875rem;" th:text="${req.user.email}"></div>
                    <div th:if="${req.user.phoneNumber}" style="font-size:0.875rem;" th:text="${req.user.phoneNumber}"></div>
                </div>
                <div style="background:var(--bg);border-radius:10px;padding:14px;">
                    <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;">Route</div>
                    <div style="font-size:0.875rem;"><strong>From:</strong> <span th:text="${req.pickupAddress}"></span></div>
                    <div style="font-size:0.875rem;margin-top:4px;"><strong>To:</strong> <span th:text="${req.dropoffAddress}"></span></div>
                    <div th:if="${req.additionalNotes}" style="font-size:0.8rem;color:var(--text-muted);margin-top:6px;font-style:italic;" th:text="${req.additionalNotes}"></div>
                </div>
            </div>

            <div th:if="${req.adminNotes}" style="background:#fff8e6;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:0.875rem;">
                <strong>Admin note:</strong> <span th:text="${req.adminNotes}"></span>
            </div>

            <div th:if="${req.status=='PENDING'}" style="display:flex;gap:12px;flex-wrap:wrap;">
                <form th:action="@{/admin/requests/approve/{id}(id=${req.id})}" method="post" style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;flex:1;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div style="display:flex;flex-direction:column;gap:4px;">
                        <label style="font-size:0.75rem;font-weight:600;color:var(--text-muted);">End Time</label>
                        <input type="time" name="endTime" style="padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.875rem;outline:none;" />
                    </div>
                    <div style="display:flex;flex-direction:column;gap:4px;">
                        <label style="font-size:0.75rem;font-weight:600;color:var(--text-muted);">Fee (R)</label>
                        <input type="number" name="fee" step="0.01" min="0" placeholder="Auto" style="width:110px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.875rem;outline:none;" />
                    </div>
                    <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px;">
                        <label style="font-size:0.75rem;font-weight:600;color:var(--text-muted);">Note to user</label>
                        <input type="text" name="adminNotes" placeholder="e.g. Confirmed!" style="padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.875rem;outline:none;" />
                    </div>
                    <button type="submit" class="btn btn-success btn-sm" onclick="return confirm('Approve this request?')">✓ Approve</button>
                </form>
                <form th:action="@{/admin/requests/reject/{id}(id=${req.id})}" method="post" style="display:flex;gap:8px;align-items:flex-end;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div style="display:flex;flex-direction:column;gap:4px;">
                        <label style="font-size:0.75rem;font-weight:600;color:var(--text-muted);">Reason</label>
                        <input type="text" name="adminNotes" placeholder="e.g. Not available" style="width:180px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.875rem;outline:none;" />
                    </div>
                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Reject this request?')">✕ Reject</button>
                </form>
            </div>
        </div>
    </div>
</div>
</div>
<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/admin-notifications.js}"></script>
</body>
</html>
