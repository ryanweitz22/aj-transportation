<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AJ Transportation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo">
            <div class="logo-aj">AJ</div>
            <span class="logo-text">Transportation</span>
        </a>
        <div class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/bookings}">Bookings</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/contact}">Contact</a>
        </div>
        <div class="nav-actions">
            <a th:href="@{/register}" class="btn-nav-register">Register</a>
        </div>
        <button class="nav-hamburger" onclick="toggleMobileMenu()">
            <span></span><span></span><span></span>
        </button>
    </div>
    <div class="nav-mobile" id="mobileMenu">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/bookings}">Bookings</a>
        <a th:href="@{/about}">About</a>
        <a th:href="@{/contact}">Contact</a>
        <a th:href="@{/register}" class="mobile-register">Register</a>
    </div>
</nav>

<!-- LOGIN FORM -->
<div class="auth-page">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-aj">AJ</div>
            <span class="logo-text" style="font-size:1.1rem;">Transportation</span>
        </div>

        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-sub">Sign in to manage your bookings</p>

        <!-- Success message after registration -->
        <div th:if="${param.registered}" class="alert alert-success">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Account created successfully! Please log in.
        </div>

        <!-- Error message from failed login -->
        <div th:if="${errorMessage}" class="alert alert-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Login Form — Spring Security processes this at POST /login -->
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                  <label class="form-label" for="identifier">Email or Username</label>
                  <input type="text"
                      id="identifier"
                      name="identifier"
                       class="form-input"
                      placeholder="your@email.com or yourusername"
                      autocomplete="username"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position:relative;">
                    <input type="password"
                           id="password"
                           name="password"
                           class="form-input"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           required
                           style="padding-right: 44px;">
                    <!-- Show/hide password toggle -->
                    <button type="button"
                            onclick="togglePassword('password', this)"
                            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                                   background:none;border:none;cursor:pointer;color:var(--text-muted);
                                   padding:4px;display:flex;align-items:center;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;">
                Sign In
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>

    </div>
</div>

<script th:src="@{/js/main.js}"></script>
<script>
function togglePassword(fieldId, btn) {
    const field = document.getElementById(fieldId);
    field.type = field.type === 'password' ? 'text' : 'password';
    btn.style.color = field.type === 'text' ? 'var(--primary)' : 'var(--text-muted)';
}
</script>
</body>
</html>
