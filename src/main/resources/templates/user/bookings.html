<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">

<title>Book a Trip — AJ Transportation</title>

<main>
  <div class="bookings-page">

    <!-- Page Header -->
    <div class="bookings-header">
      <h1>Book Your Trip</h1>
      <p>Browse available slots and book up to a year in advance.</p>
    </div>

    <!-- Success / Error flash messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- Week navigation -->
    <div class="week-nav">
      <!-- Disable Prev if we're already on the current week -->
      <a th:href="@{/bookings(week=${prevWeek})}"
         th:classappend="${prevWeek.isBefore(#temporals.createNow().toLocalDate().with(T(java.time.DayOfWeek).MONDAY))} ? 'btn-disabled' : ''"
         class="btn btn-secondary week-nav-btn">
        ← Previous Week
      </a>

      <span class="week-label"
            th:text="${#temporals.format(weekStart, 'dd MMM')} + ' – ' + ${#temporals.format(weekEnd, 'dd MMM yyyy')}">
      </span>

      <!-- Disable Next if we've reached 1 year out -->
      <a th:href="@{/bookings(week=${nextWeek})}"
         th:classappend="${nextWeek.isAfter(maxWeek)} ? 'btn-disabled' : ''"
         class="btn btn-secondary week-nav-btn">
        Next Week →
      </a>
    </div>

    <!-- Calendar Legend -->
    <div class="calendar-legend">
      <span class="legend-item"><span class="dot dot-available"></span> Available</span>
      <span class="legend-item"><span class="dot dot-booked"></span> Booked</span>
    </div>

    <!-- Login prompt for guests -->
    <div sec:authorize="isAnonymous()" class="info-banner">
      <p>🔒 <a href="/login">Log in</a> or <a href="/register">register</a> to book a slot.</p>
    </div>

    <!-- Calendar container — calendar.js renders slots here -->
    <div id="calendar-container" class="calendar-container">
      <!-- Slots are rendered by calendar.js using the tripsJson variable below -->
    </div>

    <!-- Booking form (hidden by default, shown by calendar.js when user clicks a slot) -->
    <div id="booking-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Confirm Booking</h2>
        <div id="booking-details"></div>

        <sec:authorize access="isAuthenticated()">
          <form id="booking-form" action="/bookings/book" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" id="tripIdInput" name="tripId" value="" />
            <div class="modal-actions">
              <button type="submit" class="btn btn-primary">Confirm Booking</button>
              <button type="button" class="btn btn-secondary" onclick="closeBookingModal()">Cancel</button>
            </div>
          </form>
        </sec:authorize>

        <sec:authorize access="isAnonymous()">
          <p class="modal-login-prompt">Please <a href="/login">log in</a> to confirm this booking.</p>
          <button type="button" class="btn btn-secondary" onclick="closeBookingModal()">Close</button>
        </sec:authorize>

      </div>
    </div>

    <!-- Overlay backdrop for modal -->
    <div id="modal-backdrop" class="modal-backdrop hidden" onclick="closeBookingModal()"></div>

  </div>

  <!--
    Pass real trip data from the server into JavaScript.
    Thymeleaf writes the JSON string directly into the script so calendar.js can use it.
    The th:utext is intentional — the JSON is already escaped by the ObjectMapper.
  -->
  <script th:inline="javascript">
    const TRIPS_DATA = /*[[${tripsJson}]]*/ '[]';
    const WEEK_START = /*[[${weekStart}]]*/ '';
  </script>

  <script src="/js/calendar.js"></script>
</main>

</html>
