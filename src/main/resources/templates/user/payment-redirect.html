<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Payment — AJ Transportation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { margin: 0; background: var(--bg); }
        .redirect-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .redirect-card {
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.10);
            text-align: center;
        }
        .ozow-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f0fdf4;
            border: 1.5px solid #bbf7d0;
            border-radius: 99px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #16a34a;
            margin-bottom: 24px;
        }
        .spinner-wrap {
            width: 72px;
            height: 72px;
            position: relative;
            margin: 0 auto 24px;
        }
        .spinner-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 5px solid #dcfce7;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            position: absolute;
            top: 0; left: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="redirect-page">
    <div class="redirect-card">

        <div class="ozow-badge">
            🔒 Secured by Ozow
        </div>

        <div class="spinner-wrap">
            <div class="spinner-ring"></div>
        </div>

        <h2 style="font-family:'Syne',sans-serif;font-size:1.35rem;margin-bottom:10px;">
            Redirecting to payment...
        </h2>
        <p style="color:var(--text-muted);font-size:0.875rem;line-height:1.6;margin:0;">
            You are being securely redirected to Ozow to complete your payment.
            Please do not close this page.
        </p>

        <div class="security-note">
            🛡️ Your payment is processed securely by Ozow — we never store your banking details.
        </div>

    </div>
</div>

<!-- Hidden form — auto-submits to Ozow on page load -->
<form id="ozow-form" th:action="${ozowUrl}" method="POST" style="display:none;">
    <th:block th:each="entry : ${formFields}">
        <input type="hidden" th:name="${entry.key}" th:value="${entry.value}" />
    </th:block>
</form>

<script>
    // Auto-submit after 1.5s so user sees the redirect screen briefly
    setTimeout(function() {
        document.getElementById('ozow-form').submit();
    }, 1500);
</script>

</body>
</html>
