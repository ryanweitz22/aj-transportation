<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting for Approval — AJ Transportation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { margin: 0; background: var(--bg); }

        .waiting-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .waiting-card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.10);
            text-align: center;
        }

        .spinner-wrap {
            width: 80px;
            height: 80px;
            position: relative;
            margin: 0 auto 24px;
        }
        .spinner-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px solid var(--primary-light);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            position: absolute;
            top: 0; left: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 24px;
        }
        .icon-confirmed { background: #dcfce7; }
        .icon-rejected  { background: #fee2e2; }
        .icon-expired   { background: #f3f4f6; }

        .trip-details {
            background: var(--bg);
            border-radius: 14px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        .detail-row:last-child { border-bottom: none; padding-bottom: 0; }
        .detail-key { color: var(--text-muted); font-weight: 500; }
        .detail-val { font-weight: 600; color: var(--text-dark); text-align: right; max-width: 60%; }

        .pulse-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 16px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse 1.2s ease-in-out infinite;
        }
        .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%,80%,100% { opacity: 0.3; transform: scale(0.85); }
            40%          { opacity: 1;   transform: scale(1); }
        }

        .waiting-btn {
            display: none;
            width: 100%;
            justify-content: center;
            margin-top: 16px;
        }
        .waiting-btn.show { display: flex; }

        .countdown-bar-wrap {
            width: 100%;
            background: var(--bg);
            border-radius: 99px;
            height: 6px;
            margin: 16px 0 8px;
            overflow: hidden;
        }
        .countdown-bar {
            height: 100%;
            border-radius: 99px;
            background: var(--primary);
            transition: width 1s linear;
        }
        .countdown-text {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .redirect-notice {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>

<div class="waiting-page">
    <div class="waiting-card">

        <div class="spinner-wrap" id="spinner-wrap">
            <div class="spinner-ring"></div>
        </div>

        <div class="status-icon icon-confirmed" id="icon-confirmed">✅</div>
        <div class="status-icon icon-rejected"  id="icon-rejected">❌</div>
        <div class="status-icon icon-expired"   id="icon-expired">⏱️</div>

        <h2 id="waiting-title"
            style="font-family:'Syne',sans-serif;font-size:1.4rem;margin-bottom:8px;">
            Finding your driver...
        </h2>
        <p id="waiting-subtitle"
           style="color:var(--text-muted);font-size:0.9rem;line-height:1.6;margin-bottom:0;">
            Your booking request has been sent. Please wait while the driver reviews it.
        </p>

        <div id="countdown-wrap">
            <div class="countdown-bar-wrap">
                <div class="countdown-bar" id="countdown-bar" style="width:100%;"></div>
            </div>
            <p class="countdown-text" id="countdown-text">Waiting for driver response...</p>
        </div>

        <div class="trip-details">
            <div class="detail-row">
                <span class="detail-key">Date</span>
                <span class="detail-val"
                      th:text="${#temporals.format(date,'EEE dd MMM yyyy')}">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-key">Time</span>
                <span class="detail-val"
                      th:text="${#temporals.format(time,'HH:mm')}">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-key">Pickup</span>
                <span class="detail-val"
                      th:text="${pickup != null ? pickup : '—'}">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-key">Dropoff</span>
                <span class="detail-val"
                      th:text="${dropoff != null ? dropoff : '—'}">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-key">Estimated Fare</span>
                <span class="detail-val" th:text="${fare}">TBC</span>
            </div>
        </div>

        <div class="pulse-dots" id="pulse-dots">
            <div class="pulse-dot"></div>
            <div class="pulse-dot"></div>
            <div class="pulse-dot"></div>
        </div>

        <a href="/dashboard" id="btn-dashboard" class="btn btn-primary waiting-btn">
            Go to My Dashboard →
        </a>
        <a href="/bookings" id="btn-bookagain" class="btn btn-secondary waiting-btn">
            ← Try Another Slot
        </a>

        <p id="redirect-notice" class="redirect-notice">
            Redirecting to payment...
        </p>

    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const BOOKING_ID = /*[[${bookingId}]]*/ '';
    /*]]>*/
</script>

<script>
    const POLL_INTERVAL_MS = 3000;
    const MAX_WAIT_MS      = 120000;
    const startTime        = Date.now();
    let   pollTimer        = null;
    let   countdownTimer   = null;
    let   resolved         = false;

    // ── Countdown bar ─────────────────────────────────────────────────────────
    function updateCountdown() {
        const elapsed   = Date.now() - startTime;
        const pct       = Math.max(0, 100 - (elapsed / MAX_WAIT_MS) * 100);
        const remaining = Math.max(0, Math.ceil((MAX_WAIT_MS - elapsed) / 1000));

        const bar  = document.getElementById('countdown-bar');
        const text = document.getElementById('countdown-text');
        if (bar)  bar.style.width = pct + '%';
        if (text) text.textContent = remaining > 0
            ? `Driver has ${remaining}s to respond`
            : 'No response — booking will be cancelled';

        if (remaining <= 30 && bar) bar.style.background = '#f0a500';
        if (remaining <= 0) clearInterval(countdownTimer);
    }

    countdownTimer = setInterval(updateCountdown, 1000);
    updateCountdown();

    // ── Polling ───────────────────────────────────────────────────────────────
    function poll() {
        if (resolved) return;
        fetch('/bookings/status/' + BOOKING_ID)
            .then(r => r.json())
            .then(data => {
                if (data.status === 'PENDING_APPROVAL') return;
                resolved = true;
                clearInterval(pollTimer);
                clearInterval(countdownTimer);
                handleStatusChange(data.status);
            })
            .catch(() => {});
    }

    pollTimer = setInterval(poll, POLL_INTERVAL_MS);
    poll();

    // ── Handle resolved status ────────────────────────────────────────────────
    function handleStatusChange(status) {
        document.getElementById('spinner-wrap').style.display   = 'none';
        document.getElementById('countdown-wrap').style.display = 'none';
        document.getElementById('pulse-dots').style.display     = 'none';

        if (status === 'AWAITING_PAYMENT') {
            // Admin accepted — redirect user to Ozow payment page
            document.getElementById('icon-confirmed').style.display = 'flex';
            document.getElementById('waiting-title').textContent    = 'Booking accepted! 🎉';
            document.getElementById('waiting-subtitle').textContent =
                'Your booking has been approved. Redirecting you to complete payment...';
            document.getElementById('redirect-notice').style.display = 'block';
            // Small delay so user sees the confirmation before being sent to Ozow
            setTimeout(() => {
                window.location.href = '/payment/initiate/' + BOOKING_ID;
            }, 2000);

        } else if (status === 'REJECTED') {
            document.getElementById('icon-rejected').style.display  = 'flex';
            document.getElementById('waiting-title').textContent    = 'Booking declined';
            document.getElementById('waiting-subtitle').textContent =
                'Unfortunately the driver could not accept this trip. Please try a different time slot.';
            document.getElementById('btn-bookagain').classList.add('show');

        } else if (status === 'EXPIRED') {
            document.getElementById('icon-expired').style.display   = 'flex';
            document.getElementById('waiting-title').textContent    = 'No response received';
            document.getElementById('waiting-subtitle').textContent =
                'The driver did not respond in time. Your booking has been cancelled. Please try again.';
            document.getElementById('btn-bookagain').classList.add('show');

        } else {
            document.getElementById('icon-expired').style.display   = 'flex';
            document.getElementById('waiting-title').textContent    = 'Booking cancelled';
            document.getElementById('waiting-subtitle').textContent =
                'This booking has been cancelled.';
            document.getElementById('btn-bookagain').classList.add('show');
        }
    }
</script>
</body>
</html>
