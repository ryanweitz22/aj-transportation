<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">

<title>My Dashboard — AJ Transportation</title>

<main>
  <div class="dashboard-page">

    <!-- Welcome Header -->
    <div class="dashboard-header">
      <div>
        <h1>Welcome back, <span th:text="${user.username}">User</span> 👋</h1>
        <p th:text="${user.email}" class="dashboard-email"></p>
      </div>
      <a href="/bookings" class="btn btn-primary">+ Book a Trip</a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <!-- Stats cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-number" th:text="${activeBookingCount}">0</span>
        <span class="stat-label">Active Bookings</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" th:text="${totalBookingCount}">0</span>
        <span class="stat-label">Total Trips</span>
      </div>
      <div class="stat-card">
        <span class="stat-number">
          <!-- Count only CONFIRMED + PAID bookings -->
          <th:block th:with="paidCount=${#lists.size(bookings.?[status == 'CONFIRMED' and paymentStatus == 'PAID'])}">
            <span th:text="${paidCount}">0</span>
          </th:block>
        </span>
        <span class="stat-label">Completed Trips</span>
      </div>
    </div>

    <!-- Bookings Table -->
    <div class="dashboard-section">
      <h2>Your Bookings</h2>

      <!-- Empty state -->
      <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        <p>You haven't made any bookings yet.</p>
        <a href="/bookings" class="btn btn-primary">Browse available slots →</a>
      </div>

      <!-- Bookings table -->
      <div th:unless="${#lists.isEmpty(bookings)}" class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Route</th>
              <th>Fee</th>
              <th>Booking Status</th>
              <th>Payment</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="booking : ${bookings}">
              <td th:text="${#temporals.format(booking.trip.date, 'EEE dd MMM yyyy')}"></td>
              <td th:text="${#temporals.format(booking.trip.startTime, 'HH:mm')} + ' – ' + ${#temporals.format(booking.trip.endTime, 'HH:mm')}"></td>
              <td th:text="${booking.trip.label}"></td>
              <td th:text="${booking.trip.fee != null ? 'R' + booking.trip.fee : '—'}"></td>

              <!-- Booking status badge -->
              <td>
                <span class="status-badge"
                      th:classappend="${booking.status == 'CONFIRMED'} ? 'badge-confirmed' :
                                      (${booking.status == 'CANCELLED'} ? 'badge-cancelled' : 'badge-pending')"
                      th:text="${booking.status}">
                </span>
              </td>

              <!-- Payment status badge -->
              <td>
                <span class="status-badge"
                      th:classappend="${booking.paymentStatus == 'PAID'} ? 'badge-paid' : 'badge-unpaid'"
                      th:text="${booking.paymentStatus}">
                </span>
              </td>

              <!-- Cancel button (only if not already cancelled and trip is in the future) -->
              <td>
                <form th:if="${booking.status != 'CANCELLED' and booking.trip.date.isAfter(#temporals.createNow().toLocalDate())}"
                      th:action="@{/bookings/cancel/{id}(id=${booking.id})}"
                      method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  <button type="submit" class="btn btn-sm btn-danger"
                          onclick="return confirm('Are you sure you want to cancel this booking?')">
                    Cancel
                  </button>
                </form>
                <span th:if="${booking.status == 'CANCELLED'}" class="text-muted">—</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

</html>
