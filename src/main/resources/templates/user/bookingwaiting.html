<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finding Your Driver — AJ Transportation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg); }

        .waiting-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .waiting-card {
            background: white;
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* ── Spinner ── */
        .spinner-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            position: relative;
        }
        .spinner-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid rgba(10,124,110,0.12);
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            position: absolute;
            top: 0; left: 0;
        }
        .spinner-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Result icons (hidden by default) ── */
        .result-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 24px;
        }
        .result-icon.confirmed { background: #dcfce7; display: flex; }
        .result-icon.rejected  { background: #fee2e2; display: flex; }
        .result-icon.expired   { background: #f3f4f6; display: flex; }

        .waiting-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .waiting-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* ── Timer ── */
        .timer-wrap {
            margin-bottom: 24px;
        }
        .timer-bar-bg {
            height: 6px;
            background: rgba(10,124,110,0.1);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .timer-bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 99px;
            width: 100%;
            transition: width 1s linear;
        }
        .timer-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .timer-seconds {
            font-weight: 700;
            color: var(--primary);
        }

        /* ── Trip summary card ── */
        .trip-summary {
            background: var(--bg);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        .trip-summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border);
        }
        .trip-summary-row:last-child { border-bottom: none; }
        .trip-summary-row .label { color: var(--text-muted); font-weight: 500; }
        .trip-summary-row .value { font-weight: 600; color: var(--text-dark); text-align: right; max-width: 60%; }

        .cancel-btn {
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 0.875rem;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }
        .cancel-btn:hover { border-color: #dc2626; color: #dc2626; }

        .action-btn {
            display: none;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            margin-top: 16px;
        }
        .action-btn.show { display: block; }
        .action-btn.primary { background: var(--primary); color: white; }
        .action-btn.secondary { background: var(--bg); color: var(--text-dark); border: 1.5px solid var(--border); }
    </style>
</head>
<body>
<div class="waiting-page">
    <div class="waiting-card">

        <!-- Spinner (shown while waiting) -->
        <div class="spinner-wrap" id="spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-icon">🚗</div>
        </div>

        <!-- Result icons (shown after response) -->
        <div class="result-icon" id="icon-confirmed">✅</div>
        <div class="result-icon" id="icon-rejected">❌</div>
        <div class="result-icon" id="icon-expired">⏱️</div>

        <div class="waiting-title" id="waiting-title">Finding your driver...</div>
        <div class="waiting-subtitle" id="waiting-subtitle">
            Your booking has been sent to the driver.<br>This usually takes less than a minute.
        </div>

        <!-- Countdown timer bar -->
        <div class="timer-wrap" id="timer-wrap">
            <div class="timer-bar-bg">
                <div class="timer-bar-fill" id="timer-bar"></div>
            </div>
            <div class="timer-text">
                Expires in <span class="timer-seconds" id="timer-seconds">60</span>s
            </div>
        </div>

        <!-- Trip summary -->
        <div class="trip-summary">
            <div class="trip-summary-row">
                <span class="label">Pickup</span>
                <span class="value" th:text="${pickup}"></span>
            </div>
            <div class="trip-summary-row">
                <span class="label">Dropoff</span>
                <span class="value" th:text="${dropoff}"></span>
            </div>
            <div class="trip-summary-row">
                <span class="label">Date</span>
                <span class="value" th:text="${#temporals.format(date, 'EEE dd MMM yyyy')}"></span>
            </div>
            <div class="trip-summary-row">
                <span class="label">Time</span>
                <span class="value" th:text="${#temporals.format(time, 'HH:mm')}"></span>
            </div>
            <div class="trip-summary-row">
                <span class="label">Fare</span>
                <span class="value" style="color:var(--primary);font-weight:700;" th:text="${fare}"></span>
            </div>
        </div>

        <!-- Cancel button (shown while waiting) -->
        <div id="cancel-wrap">
            <form th:action="@{/bookings/cancel/{id}(id=${bookingId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="cancel-btn"
                        onclick="return confirm('Cancel this booking?')">Cancel booking</button>
            </form>
        </div>

        <!-- Action buttons (shown after result) -->
        <a href="/dashboard" class="action-btn primary" id="btn-dashboard">Go to My Dashboard</a>
        <a href="/bookings" class="action-btn secondary" id="btn-bookagain">Book Another Trip</a>

    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const BOOKING_ID = /*[[${bookingId}]]*/ '';
    /*]]>*/
</script>
<script>
    const TOTAL_SECONDS = 60;
    let secondsLeft = TOTAL_SECONDS;
    let pollInterval = null;
    let timerInterval = null;

    // ── Start polling + countdown on page load ────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
        startCountdown();
        pollStatus();
        pollInterval = setInterval(pollStatus, 3000);
    });

    // ── Countdown timer ───────────────────────────────────────────────────────
    function startCountdown() {
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            secondsLeft--;
            updateTimerDisplay();
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const s = Math.max(secondsLeft, 0);
        document.getElementById('timer-seconds').textContent = s;
        const pct = (s / TOTAL_SECONDS) * 100;
        document.getElementById('timer-bar').style.width = pct + '%';

        // Turn bar red in last 10 seconds
        if (s <= 10) {
            document.getElementById('timer-bar').style.background = '#dc2626';
            document.getElementById('timer-seconds').style.color = '#dc2626';
        }
    }

    // ── Poll backend every 3 seconds ──────────────────────────────────────────
    async function pollStatus() {
        try {
            const res  = await fetch(`/bookings/status/${BOOKING_ID}`);
            const data = await res.json();
            handleStatus(data.status);
        } catch (e) {
            // Network error — keep polling
        }
    }

    // ── Handle status response ────────────────────────────────────────────────
    function handleStatus(status) {
        if (status === 'PENDING_APPROVAL') return; // Still waiting — do nothing

        // Stop polling + timer
        clearInterval(pollInterval);
        clearInterval(timerInterval);

        // Hide spinner + timer + cancel
        document.getElementById('spinner').style.display    = 'none';
        document.getElementById('timer-wrap').style.display = 'none';
        document.getElementById('cancel-wrap').style.display = 'none';

        if (status === 'CONFIRMED') {
            document.getElementById('icon-confirmed').style.display = 'flex';
            document.getElementById('waiting-title').textContent    = 'Driver confirmed! 🎉';
            document.getElementById('waiting-subtitle').textContent =
                'Your booking is confirmed. Payment will be processed shortly.';
            document.getElementById('btn-dashboard').classList.add('show');

        } else if (status === 'REJECTED') {
            document.getElementById('icon-rejected').style.display  = 'flex';
            document.getElementById('waiting-title').textContent    = 'Booking declined';
            document.getElementById('waiting-subtitle').textContent =
                'Unfortunately the driver could not accept this trip. Please try a different time slot.';
            document.getElementById('btn-bookagain').classList.add('show');

        } else if (status === 'EXPIRED') {
            document.getElementById('icon-expired').style.display   = 'flex';
            document.getElementById('waiting-title').textContent    = 'No response received';
            document.getElementById('waiting-subtitle').textContent =
                'The driver did not respond in time. Your booking has been cancelled automatically. Please try again.';
            document.getElementById('btn-bookagain').classList.add('show');

        } else {
            // CANCELLED or other
            document.getElementById('icon-expired').style.display   = 'flex';
            document.getElementById('waiting-title').textContent    = 'Booking cancelled';
            document.getElementById('waiting-subtitle').textContent =
                'This booking has been cancelled.';
            document.getElementById('btn-bookagain').classList.add('show');
        }
    }
</script>
</body>
</html>
