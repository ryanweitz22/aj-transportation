# ============================================
# AJ TRANSPORTATION - MAIN CONFIG
# Safe to commit to GitHub
# ============================================

spring.application.name=aj-transportation

# Load local secrets
spring.config.import=optional:classpath:application-local.properties

# Database settings (credentials come from local file)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080

# Email settings (credentials come from local file)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.jpa.open-in-view=false
app.base-url=http://localhost:8080

# ── HikariCP connection health (Option A fix) ─────────────────────────────────
# Validates every connection before use — if Supabase has aborted it,
# HikariCP discards it and opens a fresh clean connection instead.
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=3000